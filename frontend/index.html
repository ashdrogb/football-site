<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PITCH — Football Analysis</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>

<header>
  <div class="logo">PITCH <span>⬤</span></div>
  <div style="display:flex;align-items:center;gap:16px">
    <div class="live-badge"><div class="live-dot"></div>LIVE DATA</div>
    <span id="last-updated" style="font-size:0.72rem;color:var(--text3);font-family:var(--font-mono)"></span>
  </div>
</header>

<!-- WC banner -->
<div id="wc-banner" style="display:none;background:linear-gradient(135deg,#0a1628,#0d2240,#0a1628);
  border-bottom:1px solid rgba(255,215,0,0.25);padding:14px 32px;align-items:center;gap:16px">
  <span style="font-size:2rem">🏆</span>
  <div>
    <div style="font-family:var(--font-display);font-size:1.1rem;letter-spacing:3px;color:#ffd700">FIFA WORLD CUP 2026</div>
    <div style="font-size:0.72rem;color:#8892a4;margin-top:2px;letter-spacing:0.5px">48 TEAMS · USA / MEXICO / CANADA · JUN 11 – JUL 19, 2026</div>
  </div>
  <div style="margin-left:auto;font-size:0.68rem;color:#ffd700;background:rgba(255,215,0,0.08);
    border:1px solid rgba(255,215,0,0.2);padding:5px 12px;border-radius:12px;font-family:var(--font-mono)">
    LIVE UPDATES
  </div>
</div>

<!-- League bar -->
<div class="league-bar" id="league-bar">
  <div class="loading-row" style="padding:6px 0"><div class="spinner"></div></div>
</div>

<!-- Error bar -->
<div id="error-bar" style="display:none;background:rgba(255,82,82,0.1);border-bottom:1px solid rgba(255,82,82,0.2);
  padding:10px 32px;font-size:0.78rem;color:var(--loss)">
</div>

<!-- MAIN -->
<main id="main-layout">

  <!-- Regular league view -->
  <div id="regular-view" style="display:contents">
    <div>
      <div class="stats-grid" style="margin-bottom:24px">
        <div class="stat-tile"><div class="stat-value" id="stat-total-goals">—</div><div class="stat-label">Total Goals</div></div>
        <div class="stat-tile"><div class="stat-value" id="stat-matches">—</div><div class="stat-label">Matches</div></div>
        <div class="stat-tile"><div class="stat-value" id="stat-avg">—</div><div class="stat-label">Goals / Match</div></div>
        <div class="stat-tile"><div class="stat-value" id="stat-clean">—</div><div class="stat-label">Clean Sheets</div></div>
      </div>
      <div class="section-title">FIXTURES &amp; RESULTS</div>
      <div id="scores-container"><div class="loading-row"><div class="spinner"></div> Loading matches…</div></div>
    </div>
    <div>
      <div class="section-title">LEAGUE TABLE</div>
      <div class="card" style="margin-bottom:24px">
        <div id="standings-container"><div class="loading-row"><div class="spinner"></div></div></div>
      </div>
      <div class="section-title">ANALYSIS</div>
      <div class="card">
        <div class="tab-bar">
          <button class="tab-btn active" onclick="switchTab('tab-scorers',this)">Top Scoring Teams</button>
          <button class="tab-btn" onclick="switchTab('tab-highlights',this)">Top Matches</button>
        </div>
        <div class="tab-panel active" id="tab-scorers">
          <div style="padding:12px 16px 0;font-size:0.7rem;color:var(--text3);letter-spacing:1px">GOALS SCORED BY TEAM</div>
          <div id="top-scorers-container" style="padding:12px 16px 16px"><div class="loading-row"><div class="spinner"></div></div></div>
        </div>
        <div class="tab-panel" id="tab-highlights">
          <div id="highlights-container"><div class="loading-row"><div class="spinner"></div></div></div>
        </div>
      </div>
    </div>
  </div>

  <!-- World Cup view -->
  <div id="wc-view" style="display:none;grid-column:1/-1">
    <div class="tab-bar" style="margin-bottom:20px;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;background:var(--card)">
      <button class="tab-btn active" onclick="switchWCTab('wc-groups',this)">Groups</button>
      <button class="tab-btn" onclick="switchWCTab('wc-bracket',this)">Knockout Bracket</button>
      <button class="tab-btn" onclick="switchWCTab('wc-schedule',this)">Schedule</button>
      <button class="tab-btn" onclick="switchWCTab('wc-scorers',this)">Top Scorers</button>
      <button class="tab-btn" onclick="switchWCTab('wc-players',this)">Players &amp; Fantasy</button>
      <button class="tab-btn" onclick="switchWCTab('wc-info',this)">Info</button>
    </div>
    <div id="wc-groups"   class="wc-tab"></div>
    <div id="wc-bracket"  class="wc-tab" style="display:none"></div>
    <div id="wc-schedule" class="wc-tab" style="display:none"></div>
    <div id="wc-scorers"  class="wc-tab" style="display:none"></div>
    <div id="wc-players"  class="wc-tab" style="display:none"></div>
    <div id="wc-info"     class="wc-tab" style="display:none"></div>
  </div>

</main>

<!-- Match modal -->
<div id="match-modal" style="display:none;position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,0.75);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:16px">
  <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;
    width:100%;max-width:540px;max-height:82vh;overflow-y:auto;position:relative">
    <button id="modal-close" style="position:absolute;top:12px;right:14px;background:none;border:none;
      color:var(--text2);font-size:1.2rem;cursor:pointer;line-height:1">✕</button>
    <div id="modal-body"></div>
  </div>
</div>

<script src="/static/js/espn.js"></script>
<script src="/static/js/wc-bracket.js"></script>
<script src="/static/js/app.js"></script>
<script>
function switchTab(id,btn){
  document.querySelectorAll('#regular-view .tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('#regular-view .tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active'); btn.classList.add('active');
}
function switchWCTab(id,btn){
  document.querySelectorAll('.wc-tab').forEach(p=>{p.classList.remove('active');p.style.display='none';});
  document.querySelectorAll('#wc-view .tab-btn').forEach(b=>b.classList.remove('active'));
  const el=document.getElementById(id); el.style.display='block'; el.classList.add('active');
  btn.classList.add('active');
  if(id==='wc-bracket') renderBracket(el);
  if(id==='wc-info')    renderWCInfo(el);
  if(id==='wc-players' && !el.innerHTML.trim()) loadWCPlayers();
}
setInterval(()=>{
  const el=document.getElementById('last-updated');
  if(el) el.textContent='Updated '+new Date().toLocaleTimeString();
},1000);
</script>
</body>
</html>
